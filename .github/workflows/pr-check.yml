name: PR Check

"on":
  pull_request:
    branches:
      - master

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Filter changed paths
        id: filter
        shell: bash
        run: |
          frontend=false
          backend=false
          base_sha="${{ github.event.pull_request.base.sha }}"

          while IFS= read -r file; do
            case "$file" in
              src/*|public/*|scripts/*)
                frontend=true
                ;;
            esac

            case "$file" in
              */*) ;;
              *.cjs|*.html|*.json|*.jsonc|*.ts|*.mts|*.cts|pnpm-lock.yaml|pnpm-workspace.yaml)
                frontend=true
                ;;
            esac

            case "$file" in
              src-tauri/*|rust-toolchain.toml|package.json|pnpm-lock.yaml|pnpm-workspace.yaml|.release-it.ts|scripts/buildIcon.ts)
                backend=true
                ;;
            esac
          done < <(git diff --name-only "$base_sha" HEAD)

          {
            echo "frontend=$frontend"
            echo "backend=$backend"
          } >> "$GITHUB_OUTPUT"

  frontend:
    name: Frontend Check
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome
        run: pnpm lint

      - name: TypeScript
        run: pnpm tsc

  backend:
    name: Rust Check
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt, clippy

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Tauri icons
        run: pnpm build:icon
        env:
          PLATFORM: ${{ matrix.os }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Rust fmt
        working-directory: src-tauri
        run: cargo fmt --all --check

      - name: Rust clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Rust test
        working-directory: src-tauri
        run: cargo test --all-targets --all-features
